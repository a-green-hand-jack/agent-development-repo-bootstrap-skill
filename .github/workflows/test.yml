name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python
        run: |
          python3 -m py_compile \
            skills/agent-development-repo-bootstrap/scripts/bootstrap_agent_development_repo.py \
            tests/test_bootstrap_agent_development_repo.py \
            tests/validate_skill.py
      - name: Run unit tests
        run: python3 -m unittest tests/test_bootstrap_agent_development_repo.py
      - name: Validate skill metadata
        run: python3 tests/validate_skill.py skills/agent-development-repo-bootstrap
